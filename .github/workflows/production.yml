name: Production CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Quản lý concurrency theo nhánh để tránh các job deploy chồng chéo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Code Quality & Verification (Lint, Typecheck, Test)
  # ──────────────────────────────────────────
  code-quality:
    name: Code Quality & Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js v22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint Check
        run: npm run lint --if-present

      - name: Run TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Unit Tests
        run: npm test --if-present

  # ──────────────────────────────────────────
  # JOB 2: Build & Verify Production Bundle
  # ──────────────────────────────────────────
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: code-quality
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js v22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  # ──────────────────────────────────────────
  # JOB 3: Deploy to GitHub Pages (Only on Main)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    # Nguyên tắc least privilege: Chỉ cấp quyền ghi Pages và ID Token cho Job deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
